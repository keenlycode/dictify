site_name: Dictify
site_url: https://keenlycode.github.io/dictify/
repo_url: https://github.com/keenlycode/dictify
repo_name: keenlycode/dictify
docs_dir: docs-src
site_dir: docs
theme:
  name: shadcn
  custom_dir: docs-overrides
  show_stargazers: false
extra:
  docs_home_url: /dictify/latest/
  version:
    provider: mike
extra_css:
  - asset/home.css
  - asset/version-ui.css
extra_javascript:
  - asset/version-ui.js
markdown_extensions:
  - admonition
  - attr_list
  - codehilite
  - fenced_code
  - footnotes
  - toc:
      permalink: true
  - pymdownx.blocks.details
  - pymdownx.blocks.tab
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - Dictify: index.md
  - AI Skill: guide/ai-skill.md
  - Usage: guide/usage.md
  - Field API: guide/field-api.md
  - Validation Recipes: guide/validation-recipes.md
